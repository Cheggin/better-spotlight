name: BetterSpotlight
options:
  bundleIdPrefix: com.reagan
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  BetterSpotlight:
    type: application
    platform: macOS
    sources:
      - path: BetterSpotlight
    resources:
      - path: BetterSpotlight/Resources
    preBuildScripts:
      - name: Copy .env into bundle
        script: |
          set -e
          if [ -f "${SRCROOT}/.env" ]; then
            mkdir -p "${SRCROOT}/BetterSpotlight/Resources"
            cp "${SRCROOT}/.env" "${SRCROOT}/BetterSpotlight/Resources/env.config"
          fi
        outputFiles:
          - $(SRCROOT)/BetterSpotlight/Resources/env.config
    info:
      path: BetterSpotlight/Resources/Info.plist
      properties:
        LSUIElement: true
        NSHumanReadableCopyright: ""
        CFBundleName: Better Spotlight
        CFBundleDisplayName: Better Spotlight
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleIconFile: AppIcon
        NSAppleEventsUsageDescription: Better Spotlight uses Apple Events to open files you select.
        NSCalendarsUsageDescription: Better Spotlight reads your Google Calendar via the Google API; this entitlement is reserved for future native Calendar integration.
        NSContactsUsageDescription: Better Spotlight reads your contacts to show real names and photos for senders in Mail, Messages, and Calendar.
    entitlements:
      path: BetterSpotlight/Resources/BetterSpotlight.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-only: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reagan.betterspotlight
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: BetterSpotlight/Resources/BetterSpotlight.entitlements
        INFOPLIST_FILE: BetterSpotlight/Resources/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
